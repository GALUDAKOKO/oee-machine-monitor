<head>

<style>
:root{--primary:#1a3a5c;--secondary:#e07b00;--bg:#f0f4f8;--card:#fff;--text:#1a202c;--muted:#718096}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
.app-header{background:var(--primary);color:#fff;padding:16px;display:flex;align-items:center;gap:12px}
.back-btn{background:rgba(255,255,255,.2);color:#fff;padding:7px 12px;border-radius:8px;font-size:14px;text-decoration:none;font-family:'Sarabun',sans-serif;font-weight:700;white-space:nowrap}
.header-title h1{font-size:18px;font-weight:800}
.header-title p{font-size:12px;opacity:.8;margin-top:2px}
.main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 16px}
.card{background:var(--card);border-radius:20px;padding:28px 24px;max-width:420px;width:100%;box-shadow:0 4px 20px rgba(0,0,0,.1);text-align:center}
.coffee-icon{font-size:56px;margin-bottom:8px;line-height:1}
.card h2{font-size:20px;font-weight:800;color:var(--primary);margin-bottom:16px}
.desc{font-size:15px;line-height:1.8;color:#374151;background:#f8fafc;border-radius:12px;padding:16px;margin-bottom:24px;text-align:left;border-left:4px solid var(--secondary)}
.desc p+p{margin-top:8px}
.qr-wrap{background:#fff;border-radius:16px;padding:16px;display:inline-block;box-shadow:0 2px 12px rgba(0,0,0,.08);margin-bottom:16px}
.qr-wrap img{width:200px;height:200px;display:block;border-radius:8px}
.qr-label{font-size:13px;color:var(--muted);font-weight:600;margin-top:12px}
.free-badge{display:inline-block;background:#d1fae5;color:#065f46;font-size:12px;font-weight:700;padding:4px 14px;border-radius:20px;margin-top:16px}
@media(min-width:768px){body{max-width:600px;margin:0 auto}}
</style>
</head>
